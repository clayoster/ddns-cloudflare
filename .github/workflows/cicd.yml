name: CICD Pipeline

on: [push]

env:
  PYTHON_VERSION: "3.13"
  # Define actions as YAML anchors for a single place to manage versions
  # These aren't actually environment variables, but this is a convenient place to store them for reuse in the workflow steps
  # actions/checkout v6.0.2
  ACTION_CHECKOUT: &checkout actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
  # actions/setup-python v6.2.0
  ACTION_SETUP_PYTHON: &setup-python actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
  # actions/setup-buildx v4.0.0
  ACTION_DOCKER_SETUP_BUILDX: &docker-setup-buildx docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
  # actions/login v4.0.0
  ACTION_DOCKER_LOGIN: &docker-login docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
  # actions/metadata v6.0.0
  ACTION_DOCKER_METADATA: &docker-metadata docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
  # actions/build-push v7.0.0
  ACTION_DOCKER_BUILD_PUSH: &docker-build-push docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: *checkout

      - name: Set up Python
        uses: *setup-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r app-requirements.txt -r app-dev-requirements.txt

      - name: Run pylint
        run: |
          pylint app.py

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: *checkout

      - name: Set up Python
        uses: *setup-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r app-requirements.txt -r app-dev-requirements.txt

      - name: Run pytest
        run: |
          python -m pytest -v

  build:
    needs: [lint, test]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: *checkout

      - name: Set up Docker Buildx
        uses: *docker-setup-buildx

      - name: Log in to GitHub Container Registry
        uses: *docker-login
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for container
        id: meta
        uses: *docker-metadata
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            # latest tag will automatically be applied if tag matches 0.0.0 or v0.0.0
            # to avoid the latest tag, add data after the semver (ex. 0.0.0-beta.1)

      - name: Build and push container image
        id: push
        uses: *docker-build-push
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
